<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Event Concierge</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;

background:
linear-gradient(rgba(95,114,190,0.75), rgba(155,35,234,0.75)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
width:700px;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(12px);
border-radius:18px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeIn 0.7s ease;
}

h1{
text-align:center;
margin-bottom:10px;
color:#333;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:14px;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
transition:0.3s;
}

input:focus{
border-color:#7c6cf2;
outline:none;
box-shadow:0 0 8px rgba(124,108,242,0.5);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#667eea,#764ba2);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.clear-btn{
background:#ddd;
color:#333;
}

.loading{
display:flex;
align-items:center;
margin-top:15px;
color:#444;
font-style:italic;
}

.spinner{
width:18px;
height:18px;
border:3px solid #eee;
border-top:3px solid #764ba2;
border-radius:50%;
margin-right:10px;
animation:spin 1s linear infinite;
}

/* RESULT CARD */

.result-card{
margin-top:25px;
border-radius:12px;
background:#f8f9ff;
border-left:6px solid #764ba2;
animation:slideUp 0.5s ease;
overflow:hidden;
}

.result-image{
width:100%;
height:220px;
object-fit:cover;
}

.result-content{
padding:18px;
}

.result-content h3{
margin-bottom:8px;
}

/* HISTORY */

.history-title{
margin-top:30px;
color:#333;
}

.history-card{
background:#ffffff;
border:1px solid #eee;
border-radius:10px;
padding:15px;
margin-top:12px;
transition:0.25s;
}

.history-card:hover{
transform:translateY(-4px);
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* FOOTER */

.footer{
text-align:center;
margin-top:25px;
font-size:12px;
color:#777;
}

/* ANIMATIONS */

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes slideUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<h1>AI Event Concierge</h1>
<p class="subtitle">Plan corporate offsites with AI-powered venue recommendations</p>

<div class="input-group">
<input id="eventInput" placeholder="Describe your event (e.g. 10-person leadership retreat in mountains for 3 days with $4000 budget)">
</div>

<button id="generateBtn" onclick="generateEvent()">Generate Plan</button> <button onclick="clearResults()" class="clear-btn">Clear</button>

<div id="loading" class="loading" style="display:none;">
<div class="spinner"></div>
<span>AI is planning your event...</span>
</div>

<div id="result"></div>

<h3 class="history-title">Previous Searches</h3>
<div id="history"></div>

<p class="footer">Built with Django • Gemini AI</p>

</div>

<script>

document.getElementById("eventInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
generateEvent()
}
})

async function generateEvent(){

let description=document.getElementById("eventInput").value
let btn=document.getElementById("generateBtn")

btn.disabled=true
btn.innerText="Generating..."

document.getElementById("loading").style.display="flex"

let res=await fetch("https://ai-event-concierge-backend.onrender.com/api/generate/",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({description})
})

let data=await res.json()

document.getElementById("loading").style.display="none"

btn.disabled=false
btn.innerText="Generate Plan"

document.getElementById("result").innerHTML=`

<div class="result-card">

<img class="result-image"
src="${data.image_url || 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee'}">

<div class="result-content">

<h3>🏨 ${data.venue_name}</h3>

<p>📍 <b>Location:</b> ${data.location}</p>

<p>💰 <b>Estimated Cost:</b> ${data.estimated_cost}</p>

<p>✨ ${data.why_it_fits}</p>

</div>

</div>
`

loadHistory()

}

function clearResults(){
document.getElementById("result").innerHTML=""
}

async function loadHistory(){

let res=await fetch("https://ai-event-concierge-backend.onrender.com/api/history/")
let data=await res.json()

if(data.length===0){
document.getElementById("history").innerHTML="<p style='color:#777'>No previous searches yet.</p>"
return
}

let html=""

data.forEach(item=>{

html+=`
<div class="history-card">

<h4>🏨 ${item.venue_name}</h4>

<p>📍 <b>Location:</b> ${item.location}</p>

<p>💰 <b>Cost:</b> ${item.estimated_cost}</p>

<p>${item.why_it_fits}</p>

</div>
`

})

document.getElementById("history").innerHTML=html

}

loadHistory()

</script>

</body>
</html>
